version: 0.2

env:
  variables:
    LOG_LEVEL: error
  parameter-store:
    ROCKET_CHAT_TOKEN: /RocketChatToken
    ROCKET_CHAT_USER_ID: /RocketChatUserId
    SONARQUBE_HOST_URL: /SonarQubeHostURL
    SONARQUBE_ACCESS_TOKEN: /SonarQubeAccessToken

phases:
  install:
    commands:
      - aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 283563576583.dkr.ecr.eu-west-1.amazonaws.com
      - nohup /usr/bin/dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 --storage-driver=overlay2 &
      - timeout 15 sh -c "until docker info; do echo .; sleep 1; done"
      - nohup docker pull public.ecr.aws/localstack/localstack:2.0.2 &

      - mv /packages/tools/velho/.gradle /tools/velho/
      - mv /packages/tools/velho/buildSrc/.gradle /tools/velho/buildSrc/

      # DEBUG - remove after testing
      - echo "=== Remote URL ===" && git remote get-url origin 2>&1 || true
      - echo "=== .netrc ===" && cat "$HOME/.netrc" 2>/dev/null || echo "no .netrc"
      - echo "=== .gitconfig ===" && cat "$HOME/.gitconfig" 2>/dev/null || echo "no .gitconfig"
      - echo "=== git credential fill ===" && (echo "host=github.com"; echo "protocol=https") | git credential fill 2>&1 | sed 's/password=.*/password=REDACTED/' || true
      - echo "=== GIT_ASKPASS ===" && echo "${GIT_ASKPASS:-unset}" && ([ -n "$GIT_ASKPASS" ] && file "$GIT_ASKPASS" && cat "$GIT_ASKPASS" 2>/dev/null || true)
      - echo "=== CODEBUILD env ===" && env | grep -iE "CODEBUILD_SOURCE|AUTH|TOKEN|CREDENTIAL|CODECONNECTION" | sed 's/=.*TOKEN.*/=REDACTED/' | sort || true
      - echo "=== git config ===" && git config --list 2>/dev/null | grep -iE "credential|helper|askpass" || echo "no credential config"
      - echo "=== /codebuild ===" && find /codebuild -name "*credential*" -o -name "*token*" -o -name "*gitconfig*" -o -name "*netrc*" 2>/dev/null || echo "nothing found"
      - echo "=== END DEBUG ==="
      - eval $(./deployment/bin/getGitHubAppToken.sh) || echo "Token extraction failed, continuing for debug"
      - ./deployment/lib/buildspec/commonInstallCommands.sh
  build:
    commands:
      - npm run lint
      - npm run localstack
      - npm run setupenvironment
      - npm run test:coverage
      - npm run localstack:stop &
      - npm run sonar || true
      - npm run export-under-maintenance
      - npm run deploy:backend
      - npm run upgrade-database run "$ENVIRONMENT"
      - npm run build:next-image -- --tag "$CODEBUILD_RESOLVED_SOURCE_VERSION"
      - npm run deploy:frontend
      - npm run invalidate:frontendcache
      - npm run deploy:monitoring
      - npm run deploy:stackpolicies
      - npm run opensearch:delete-index
      - npm run opensearch:index
  post_build:
    on-failure: ABORT
    commands:
      - ./deployment/bin/reportBuildStatus.sh -t "$ROCKET_CHAT_TOKEN" -u "$ROCKET_CHAT_USER_ID" -r "$CODEBUILD_BUILD_SUCCEEDING" -m "$ENVIRONMENT build" -d "CodeBuild $CODEBUILD_BUILD_URL"
cache:
  paths:
    - "/root/.cache/**/*"
    - "/root/.npm/**/*"
    - "/root/.sonar"
