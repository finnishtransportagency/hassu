openapi: 3.0.1
info:
  title: Suomi.fi Messages REST API
  description: |-
    The functionalities offered by this API are described in detail on Suomi.fi
    for Service Developers ([fi][1] / [sv][2] / [en][3]). All endpoints require a whitelisted IP address.

    All message endpoints require an auth token, which you can obtain from the
    /v1/token endpoint. Tokens can be used multiple times but expire eventually,
    at which time you must obtain a new one.

    Sending and receiving messages happens by one message per HTTP request. In some other cases,
    such as checking whether a recipient is using Suomi.fi Messages ( /mailboxes/active ) and
    fetching event information ( /events ), multiple records may be handled within the same
    request.

    When your system sends a new message, it must always parse the `messageId` value
    from the response. Your system must store it both from HTTP 200 and HTTP 409 responses.

    When sending new messages `externalId` is used as an idempotency key to
    ensure that sending a new message is only processed once, preventing
    duplicate submissions. If the same `externalId` is used more than once, a
    409 response is returned, containing the original `messageId`, to indicate
    that the message has already been processed, ensuring idempotency. These
    HTTP 409 responses should be handled equally as HTTP 200 responses.

    In all other HTTP 400 series responses, there should be something to fix in the request that
    your system has generated.

    Your system should automatically retry all requests that receive a HTTP 500 series response.

    New fields may be added to the JSON request and response bodies without
    being considered a breaking change.


    ### Markdown Formatting in Electronic Messages

    New electronic messages may contain either plain text bodies or be formatted
    using CommonMark syntax. The supported markdown features are:

      * **Headings**
      * **Lists** (ordered and unordered)
      * **Text elements** (paragraph, bold emphasis)
      * **External links** using HTTPS-protocol. Autolinks are not supported.

    To enable markdown format set `bodyFormat` to 'Markdown'.

    [1]: <https://kehittajille.suomi.fi/palvelut/viestit/toiminnallisuudet> "Suomi.fi kehittäjille"
    [2]: <https://kehittajille.suomi.fi/tjanster/meddelanden/funktioner> "Suomi.fi för tjänsteutvecklare"
    [3]: <https://kehittajille.suomi.fi/services/messages/functionalities> "Suomi.fi for Service Developers"
  version: 1.0.0
servers:
  - url: https://api.messages.suomi.fi
paths:
  /v1/token:
    post:
      tags:
        - auth
      summary: Obtain an authentication token.
      operationId: postV1Token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessTokenRequestBody'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
        "400":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
  /v1/change-password:
    post:
      tags:
        - auth
      summary: Change a  password to a new one.
      description: |-
        A valid password is at least 32 characters long and contains at least one lower case, upper case, number, and symbol character.

        Note that there can be a delay before allowing password updates again.

        As backslash "\\" is an escape character in JSON, it is best to not use it as a symbol character in your password.

        Fetch a new access token after updating the password.
      operationId: postV1ChangePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequestBody'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
        "400":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
  /v1/mailboxes/active:
    post:
      tags:
        - mailboxes
      summary: Use a recipient's personal identity code or business ID to check whether their electronic mailbox is active.
      description: Note that this endpoint should only be used in the context of sending messages.
      operationId: postV1MailboxesActive
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndUsers'
        required: true
      responses:
        "200":
          description: OK
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndUsersWithActiveMailbox'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/messages/id:
    get:
      tags:
        - messages
      summary: Retrieve the ID Suomi.fi Messages assigned to a message you have sent.
      description: Mainly used when migrating from older APIs to REST.
      operationId: getV1MessagesId
      parameters:
        - name: externalId
          in: query
          description: ID of the message in your system
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageIdResponse'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "404":
          description: Not found
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/messages/{id}:
    get:
      tags:
        - messages
      summary: Retrieve a message an end user has sent you.
      deprecated: true
      description: >-
        The data of messages sent by end users is retrievable for 60 days.
      operationId: getV1Messages
      parameters:
        - name: id
          in: path
          description: Message ID which was returned when the message was created or from another API
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageFromEndUserResponse'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "404":
          description: Not found
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v2/messages/{id}:
    get:
      tags:
        - messages
      summary: Retrieve a message an end user has sent you.
      description: >-
        The data of messages sent by end users is retrievable for 60 days.
      operationId: getV2Messages
      parameters:
        - name: id
          in: path
          description: messageId of the message sent by an end user to your service. Find the messageId in /events response.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageFromEndUserResponseV2'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "404":
          description: Not found
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/attachments/{id}:
    get:
      tags:
        - messages
      summary: Retrieve an attachment an end user has included in a message they have sent you.
      description: >-
        The data of messages sent by end users is retrievable for 60 days.
      operationId: getV1Attachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content: {}
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/attachments:
    post:
      tags:
        - messages
      deprecated: true
      summary: Upload an attachment that you want to include in an electronic message.
      description: |2-
        Uploaded attachments can be used in the endpoints immediately.

        Note that the attachment is shown to the recipient with the same name you uploaded it with.

        If attachments have not been used in a message within 24 hours, they will be removed.
      operationId: postV2Attachments
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MODELca473d'
            encoding:
              metadata:
                contentType: application/json
              file:
                contentType: image/jpeg, image/png, application/pdf, text/plain, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-powerpoint, application/vnd.openxmlformats-officedocument.presentationml.presentation, application/vnd.oasis.opendocument.text, application/vnd.oasis.opendocument.spreadsheet, image/gif, text/csv, text/xml, application/xml, application/json, application/zip, application/rtf
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewAttachmentResponse'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "413":
          description: Request too large
          content:
            text/plain:
              schema:
                type: string
                example: "HTTP content length exceeded 10485760 bytes."
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "502":
          description: Bad gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/events:
    get:
      tags:
        - events
      deprecated: true
      summary: Retrieve events related to messages you have sent or received from end users.
      description: >-
        Returns at most 1 000 events. There are no more events at this time if
        an empty event list is returned. You should not assume any logic based
        on the exact amount of events, as a varying number of events can be
        returned depending on internal API behavior.

        Event data is retrievable for 60 days.
      operationId: getV1Events
      parameters:
        - name: continuationToken
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Events'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/files:
    post:
      tags:
        - messages
      deprecated: true
      summary: Upload a PDF file that will either be attached to an electronic message or be printed and delivered via paper mail.
      description: |2
        Note that added files must adhere to Posti Messaging Oy's iPost specifications in order to ensure successful printing and delivery. The specifications can be found here: https://www.posti.fi/en/for-businesses/forwarding-of-invoices-and-messages/sending-messages/send-messages-electronically-and-on-paper-ipost/ipost-design-instructions-for-sending-letters

        The uploaded file can be used in the endpoints immediately.

        Note that if the file is delivered electronically, it is shown to the recipient with the same name you uploaded it with.

        If the file has not been used in a message within 24 hours, it will be removed.
      operationId: postV1Files
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MODEL61f3c7'
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewFileResponse'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "502":
          description: Bad gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/messages:
    post:
      tags:
        - messages
      deprecated: true
      summary: Send a message that will be delivered either electronically or as paper mail depending on the state of the recipient's electronic mailbox.
      description: Since the message can be delivered either electronically or as paper mail, you must define the specifics of the message for both channels.
      operationId: postV1MessagesController
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewMessageFromClientOrganisation'
        required: true
      responses:
        "200":
          description: OK
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "409":
          description: External ID already in use
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageAlreadyExistsResponse'
        "502":
          description: Bad gateway
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/messages/electronic:
    post:
      tags:
        - messages
      deprecated: true
      summary: Send an electronic message
      description: |2-
        If you want to send a reply to an end user's message, use this endpoint.

        Note that messages can be deleted. If you reply to a message that does not exist, your message will be sent to the recipient as if it wasn't a reply.
      operationId: postV1MessagesElectronic
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewElectronicMessageFromClientOrganisation'
        required: true
      responses:
        "200":
          description: OK
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "502":
          description: Bad gateway
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/messages/{id}/state:
    get:
      tags:
        - messages
      deprecated: true
      operationId: getV1MessagesIdState
      parameters:
        - name: id
          in: path
          description: Message ID which was returned when the message was created or from another API
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageState'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "404":
          description: Not found
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v1/paper-mail-without-id:
    post:
      tags:
        - messages
      deprecated: true
      summary: Send paper mail without using the recipient's personal identity code or business ID.
      operationId: postV1PaperMailWithoutId
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPaperMailWithoutId'
        required: true
      responses:
        "200":
          description: OK
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaperMailResponse'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "401":
          description: Unauthorized. Can result from using an expired token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "409":
          description: External ID already in use
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageAlreadyExistsResponse'
        "502":
          description: Bad gateway
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v2/attachments:
    post:
      tags:
        - messages
      summary: Upload an attachment that will either be attached to an electronic message or be printed and delivered via paper mail.
      description: |
        Uploaded attachments can be used in the endpoints immediately.

        Note that the attachment is shown to the recipient with the same name you uploaded it with.

        If attachments have not been used in a message within 24 hours, they will be removed.

        Supported content types include:
          * application/msword
          * application/pdf
          * application/vnd.ms-excel
          * application/vnd.ms-powerpoint
          * application/vnd.oasis.opendocument.spreadsheet
          * application/vnd.oasis.opendocument.text
          * application/vnd.openxmlformats-officedocument.presentationml.presentation
          * application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
          * application/vnd.openxmlformats-officedocument.wordprocessingml.document
          * image/jpeg
          * image/png
          * text/plain
      operationId: postV3Attachments
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
                - file
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "413":
          description: Request too large
          content:
            text/plain:
              schema:
                type: string
                example: "HTTP content length exceeded 10485760 bytes."
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/messages.api.rest.v2.AttachmentReference'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
        "502":
          description: Bad gateway
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v2/events:
    get:
      tags:
        - events
      summary: Retrieve events related to messages you have sent or received from end users.
      description: >-
        Returns at most 1 000 events. There are no more events at this time if
        an empty event list is returned. You should not assume any logic based
        on the exact amount of events, as a varying number of events can be
        returned depending on internal API behavior.


        Event data is retrievable for 60 days.
      operationId: getV2Events
      parameters:
        - name: continuationToken
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        "400":
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v2/messages:
    post:
      description: Since the message can be delivered either electronically or as paper mail, you must define the specifics of the message for both channels.
      operationId: postV2MessagesController
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/messages.api.rest.v2.MultichannelMessageRequestBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: OK
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageAlreadyExistsResponse'
          description: External ID already in use
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
          description: Bad gateway
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
      summary: Send a message that will be delivered either electronically or as paper mail depending on the state of the recipient's electronic mailbox.
      tags:
        - messages
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
  /v2/messages/electronic:
    post:
      description: |2
        Sends an electronic only message to an end user that is using Suomi.fi Messages. Also, if you want to send a reply to a message from an end user, use this endpoint.

        Note that messages can be deleted. If you reply to a message that does not exist, you will get an error response.

        ## Error codes
        | Code                                 | Description                                |
        | ------------------------------------ | ------------------------------------------ |
        | MAILBOX_NOT_IN_USE                   | Recipient mailbox is not active            |
        | MESSAGE_BEING_REPLIED_TO_NOT_FOUND   | The message you replied to does not exist  |
      operationId: postV2MessagesElectronic
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/messages.api.rest.v2.ElectronicMessageRequestBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: OK
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponseV1'
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
        "409":
          description: External ID already in use
          headers:
            traceId:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageAlreadyExistsResponse'
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
          description: Bad gateway
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
      summary: Send an electronic message.
      tags:
        - messages
  /v2/paper-mail-without-id:
    post:
      operationId: postV2PaperMailWithoutId
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/messages.api.rest.v2.PaperMailWithoutIdRequestBody'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaperMailResponse'
          description: OK
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
          description: Bad request
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
          description: External ID already in use
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseV1'
          description: Bad gateway
          headers:
            traceId:
              schema:
                type: string
                format: uuid
              style: simple
      summary: Send paper mail without using the recipient's personal identity code or business ID.
      tags:
        - messages
      security:
        - oauth2:
            - aws.cognito.signin.user.admin
